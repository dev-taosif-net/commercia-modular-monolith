services:
  commerciaModularMonolithDb:
    container_name: commerciaModularMonolithDb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=CommerciaModularMonolithDb
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_commerciaModularMonolithDb:/var/lib/postgresql